server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:test
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.project.commerce.user.entity

logging:
  level:
    org.mybatis: debug
    org.hibernate.SQL: debug